    <g>
        <line x1="800" y1="360" x2="950" y2="360" class="speed-line sl-1"/>
        <line x1="800" y1="200" x2="880" y2="200" class="speed-line sl-2"/>
        <line x1="800" y1="280" x2="920" y2="280" class="speed-line sl-3"/>
        <line x1="800" y1="120" x2="860" y2="120" class="speed-line sl-4"/>
    </g>

    <g class="animated-car">
        <rect x="100" y="180" width="600" height="130" rx="20" fill="#131720" stroke="rgba(255,255,255,0.15)" stroke-width="2"/>
        <path d="M 220 180 L 280 100 L 520 100 L 580 180 Z" fill="#131720" stroke="rgba(255,255,255,0.15)" stroke-width="2"/>

        <path d="M 240 170 L 290 110 L 390 110 L 390 170 Z" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.05)"/>
        <path d="M 400 170 L 400 110 L 510 110 L 560 170 Z" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.05)"/>

        <g class="wheel wheel-back">
            <circle cx="220" cy="310" r="45" fill="#0B0E14" stroke="rgba(255,255,255,0.15)" stroke-width="2"/>
            <circle cx="220" cy="310" r="15" fill="rgba(255,255,255,0.1)"/>
            <line x1="220" y1="265" x2="220" y2="355" stroke="rgba(255,255,255,0.1)" stroke-width="2"/>
            <line x1="175" y1="310" x2="265" y2="310" stroke="rgba(255,255,255,0.1)" stroke-width="2"/>
        </g>

        <g class="wheel wheel-front">
            <circle cx="580" cy="310" r="45" fill="#0B0E14" stroke="rgba(255,255,255,0.15)" stroke-width="2"/>
            <circle cx="580" cy="310" r="15" fill="rgba(255,255,255,0.1)"/>
            <line x1="580" y1="265" x2="580" y2="355" stroke="rgba(255,255,255,0.1)" stroke-width="2"/>
            <line x1="535" y1="310" x2="625" y2="310" stroke="rgba(255,255,255,0.1)" stroke-width="2"/>
        </g>

        <rect x="95" y="240" width="30" height="15" rx="4" fill="#F97316" class="car-light"/>
        <rect x="675" y="240" width="30" height="15" rx="4" fill="#F97316" class="car-light"/>
    </g>
