<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Our Fleet — DriveEasy</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/vehicles.css">
</head>
<body>

<nav>
  <a href="index.html" class="logo">Drive<span>Easy</span></a>
  <ul>
    <li><a href="vehicles.html" style="color: var(--white);">Vehicles</a></li>
    <li><a href="index.html">How it works</a></li>
  </ul>
  <div class="nav-cta">
    <a href="profile.html" class="btn-outline">My Dashboard</a>
  </div>
</nav>

<header class="fleet-header">
  <h1>Our Fleet</h1>
  <p>Find the perfect vehicle for your next journey. Filter by type, category, or search by name.</p>
</header>

<div class="filters-bar">
  <input type="text" id="searchName" class="filter-input" placeholder="🔍 Search vehicle name...">

  <select id="filterType" class="filter-input">
    <option value="">All Types (Car/Bike)</option>
    <option value="CAR">Cars</option>
    <option value="BIKE">Bikes</option>
  </select>

  <select id="filterCat" class="filter-input">
    <option value="">All Categories</option>
    <option value="Sedan">Sedan</option>
    <option value="SUV">Suv</option>
    <option value="Luxury">Luxury</option>
    <option value="Sports">Sports</option>
  </select>
</div>

<section class="fleet-section">
  <div class="vehicles-grid" id="fleetGrid">
  </div>

  <div class="pagination">
    <button id="loadMoreBtn" class="btn-ghost" onclick="loadMore()">Load More Vehicles</button>
  </div>
</section>

<footer>
  <div class="footer-bottom" style="margin-top: 0;">
    <p>© 2026 DriveEasy. Built with Spring Boot + PostgreSQL.</p>
  </div>
</footer>

<div class="modal-overlay" id="bookingModal">
  <div class="modal-content">
    <button class="modal-close" onclick="closeModal()">✕</button>

    <div class="modal-header">
      <h3>Complete Booking</h3>
      <p id="modalVehicleName">Vehicle Name</p>
    </div>

    <div class="date-grid">
      <div class="date-field">
        <label>Pick Up Date</label>
        <input type="date" id="bookStart">
      </div>
      <div class="date-field">
        <label>Return Date</label>
        <input type="date" id="bookEnd">
      </div>
    </div>

    <div class="booking-summary">
      <div class="summary-row">
        <span>Daily Rate</span>
        <span id="modalPricePerDay">₹0 / day</span>
      </div>
      <div class="summary-row">
        <span>Duration</span>
        <span id="summaryDays">0 days</span>
      </div>
      <div class="summary-row total">
        <span>Total Cost</span>
        <span id="summaryTotal" style="color: var(--accent);">₹0</span>
      </div>
    </div>

    <div class="modal-actions">
      <button class="btn-outline" onclick="closeModal()">Cancel</button>
      <button class="btn-accent" id="confirmBtn" onclick="confirmBooking()">Confirm Booking</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="config/config.js"></script>
<script src="js/vehicles.js"></script>

</body>
</html>
