<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Product Inventory Dashboard</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- 1. Header -->
  <header>
    <h1>Product Inventory Dashboard</h1>
  </header>

  <!-- 2. Controls Section -->
  <section id="controls">
    <input type="text" id="searchInput" placeholder="Search product...">

    <select id="categoryFilter">
      <option value="all">All Categories</option>
    </select>

    <button id="lowStockBtn">Low Stock</button>

    <select id="sortSelect">
      <option value="">Sort</option>
      <option value="low">Price Low → High</option>
      <option value="high">Price High → Low</option>
      <option value="az">A → Z</option>
      <option value="za">Z → A</option>
    </select>
  </section>

  <!-- 3. Analytics Section -->
  <section id="analytics">
    <div id="totalProducts">Total Products: 0</div>
    <div id="totalValue">Total Value: ₹0</div>
    <div id="outOfStock">Out of Stock: 0</div>
    <div id="categoryStats"></div>
  </section>

  <!-- 4. Product Grid -->
  <section id="productGrid">
    
  </section>

  <!-- 5. Add Product Form -->
  <section id="formSection">
    <h2>Add Product</h2>

    <form id="productForm">

      <label for="name">Product Name</label>
      <input type="text" id="name" placeholder="Enter product name" required>

      <label for="price">Price</label>
      <input type="number" id="price" placeholder="Enter price" required>

      <label for="stock">Stock Quantity</label>
      <input type="number" id="stock" placeholder="Enter stock quantity" required>

      <label for="category">Category</label>
      <select id="category" required>
        <option value="">Select Category</option>
        <option value="electronics">Electronics</option>
        <option value="clothing">Clothing</option>
        <option value="books">Books</option>
        <option value="accessories">Accessories</option>
      </select>

      <button type="submit">Add Product</button>
    </form>
  </section>

  <script src="js/script.js"></script>
</body>
</html>
